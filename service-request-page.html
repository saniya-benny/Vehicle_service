<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Service Requests</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{margin:0;background:#0c0c0c;color:white;font-family:'Oswald',sans-serif;}

.header{
background:linear-gradient(90deg,#c9a227,#b8951f);
text-align:center;
padding:40px;
}

.container{padding:40px 80px;}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;margin-bottom:35px;
}

.stat{
background:rgba(201,162,39,0.1);
border:1px solid #c9a227;
border-radius:15px;
padding:25px;
text-align:center;
}

.stat h2{color:#c9a227;margin:0;font-size:38px}

.request-search{
display:flex;
gap:15px;
background:rgba(201,162,39,0.1);
padding:18px;
border-radius:18px;
margin-bottom:35px;
}

.search-box{
flex:1;
display:flex;
background:rgba(255,255,255,0.05);
padding:12px 16px;
border-radius:12px;
align-items:center;
}

.search-box input{
flex:1;background:transparent;border:none;color:white;outline:none;
}

.filter{padding:10px 16px;border-radius:10px;border:none;background:#333;color:#ddd;cursor:pointer}
.filter.active{background:#c9a227;color:black}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:25px;
}

.card{
background:rgba(201,162,39,0.08);
border:1px solid #c9a227;
border-radius:16px;
padding:22px;
}

.user{
display:flex;gap:15px;margin:12px 0;background:rgba(255,255,255,0.05);padding:12px;border-radius:12px;
}

.avatar{
width:45px;height:45px;background:#c9a227;color:#000;
display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:bold;
}

.details{font-family:Arial;font-size:14px;opacity:.85}

.actions{display:flex;gap:12px;margin-top:15px;}

button{
flex:1;padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;
}

.approve{background:#28a745}
.decline{background:#dc3545}

.status{
margin-top:10px;
font-family:Arial;
font-size:13px;
}

.pending{color:#ffc107}
.approved{color:#28a745}
.declined{color:#dc3545}

/* ================= COMPREHENSIVE RESPONSIVE DESIGN ================= */

/* Tablet Responsive */
@media (max-width: 768px) {
    body {
        overflow-x: hidden;
    }
    
    .header {
        padding: 30px 20px;
    }
    
    .header h1 {
        font-size: 32px;
        margin-bottom: 10px;
    }
    
    .header p {
        font-size: 16px;
        margin: 0;
    }
    
    .container {
        padding: 30px 20px;
        max-width: 100%;
    }
    
    .stats {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-bottom: 25px;
    }
    
    .stat {
        padding: 20px 15px;
    }
    
    .stat h2 {
        font-size: 32px;
    }
    
    .request-search {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
        margin-bottom: 25px;
    }
    
    .search-box {
        width: 100%;
        padding: 12px 15px;
    }
    
    .search-box input {
        width: 100%;
        font-size: 14px;
    }
    
    .filter {
        width: 100%;
        padding: 12px;
        font-size: 14px;
        text-align: center;
    }
    
    .cards {
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }
    
    .card {
        padding: 18px;
        border-radius: 12px;
    }
    
    .card h3 {
        font-size: 18px;
        margin-bottom: 10px;
    }
    
    .user {
        gap: 12px;
        padding: 10px;
        margin-bottom: 10px;
    }
    
    .avatar {
        width: 40px;
        height: 40px;
        font-size: 16px;
        flex-shrink: 0;
    }
    
    .user div {
        font-size: 13px;
        line-height: 1.3;
    }
    
    .details {
        font-size: 13px;
        line-height: 1.4;
        margin-bottom: 10px;
    }
    
    .status {
        font-size: 12px;
        margin-bottom: 12px;
    }
    
    .actions {
        gap: 10px;
        margin-top: 12px;
    }
    
    button {
        padding: 10px;
        font-size: 12px;
        border-radius: 8px;
    }
}

/* Mobile Responsive */
@media (max-width: 480px) {
    .header {
        padding: 20px 15px;
    }
    
    .header h1 {
        font-size: 24px;
        margin-bottom: 8px;
        line-height: 1.2;
    }
    
    .header p {
        font-size: 14px;
    }
    
    .container {
        padding: 20px 15px;
        max-width: 100%;
    }
    
    .stats {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-bottom: 20px;
    }
    
    .stat {
        padding: 15px;
        text-align: center;
    }
    
    .stat h2 {
        font-size: 28px;
        margin-bottom: 5px;
    }
    
    .stat:not(:last-child) {
        border-bottom: 1px solid rgba(201, 162, 39, 0.2);
        padding-bottom: 15px;
        margin-bottom: 15px;
    }
    
    .request-search {
        padding: 12px;
        margin-bottom: 20px;
    }
    
    .search-box {
        padding: 10px 12px;
        margin-bottom: 10px;
    }
    
    .search-box input {
        font-size: 16px; /* Prevents zoom on iOS */
        padding: 5px 0;
    }
    
    .filter {
        padding: 10px;
        font-size: 13px;
        margin-bottom: 8px;
        min-height: 44px; /* Touch target size */
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .filter:last-child {
        margin-bottom: 0;
    }
    
    .cards {
        grid-template-columns: 1fr;
        gap: 15px;
    }
    
    .card {
        padding: 15px;
        border-radius: 10px;
    }
    
    .card h3 {
        font-size: 16px;
        margin-bottom: 8px;
        text-align: center;
    }
    
    .user {
        flex-direction: column;
        text-align: center;
        gap: 8px;
        padding: 12px;
        margin-bottom: 12px;
    }
    
    .avatar {
        width: 50px;
        height: 50px;
        font-size: 18px;
        margin: 0 auto;
    }
    
    .user div {
        text-align: center;
        font-size: 14px;
        line-height: 1.4;
    }
    
    .user div small {
        display: block;
        margin-top: 3px;
        opacity: 0.8;
    }
    
    .details {
        font-size: 13px;
        line-height: 1.5;
        text-align: center;
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        margin-bottom: 12px;
    }
    
    .status {
        font-size: 11px;
        text-align: center;
        padding: 6px 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        display: inline-block;
        width: 100%;
        box-sizing: border-box;
    }
    
    .actions {
        flex-direction: column;
        gap: 8px;
        margin-top: 15px;
    }
    
    button {
        width: 100%;
        padding: 12px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 8px;
        min-height: 44px; /* Touch target size */
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .approve {
        background: #28a745;
        color: white;
    }
    
    .decline {
        background: #dc3545;
        color: white;
    }
}

/* Extra Small Mobile */
@media (max-width: 320px) {
    .header {
        padding: 15px 10px;
    }
    
    .header h1 {
        font-size: 20px;
    }
    
    .header p {
        font-size: 13px;
    }
    
    .container {
        padding: 15px 10px;
    }
    
    .stat {
        padding: 12px;
    }
    
    .stat h2 {
        font-size: 24px;
    }
    
    .search-box {
        padding: 8px 10px;
    }
    
    .filter {
        padding: 8px;
        font-size: 12px;
        min-height: 40px;
    }
    
    .card {
        padding: 12px;
    }
    
    .card h3 {
        font-size: 15px;
    }
    
    .avatar {
        width: 45px;
        height: 45px;
        font-size: 16px;
    }
    
    .details {
        font-size: 12px;
        padding: 8px;
    }
    
    .status {
        font-size: 10px;
        padding: 5px 8px;
    }
    
    button {
        font-size: 12px;
        padding: 10px;
        min-height: 40px;
    }
}

/* Landscape Mobile */
@media (max-height: 500px) and (orientation: landscape) {
    .header {
        padding: 15px 20px;
    }
    
    .header h1 {
        font-size: 22px;
        margin-bottom: 5px;
    }
    
    .header p {
        font-size: 13px;
        margin: 0;
    }
    
    .container {
        padding: 15px 20px;
    }
    
    .stats {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 15px;
    }
    
    .stat {
        padding: 10px 8px;
    }
    
    .stat h2 {
        font-size: 20px;
        margin-bottom: 2px;
    }
    
    .request-search {
        flex-direction: row;
        padding: 10px;
        margin-bottom: 15px;
        gap: 10px;
    }
    
    .search-box {
        flex: 1;
        padding: 8px 10px;
    }
    
    .filter {
        padding: 8px 10px;
        font-size: 11px;
        min-height: 36px;
        white-space: nowrap;
    }
    
    .cards {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
    }
    
    .card {
        padding: 12px;
    }
    
    .card h3 {
        font-size: 14px;
        margin-bottom: 6px;
    }
    
    .user {
        padding: 8px;
        margin-bottom: 8px;
    }
    
    .avatar {
        width: 35px;
        height: 35px;
        font-size: 14px;
    }
    
    .user div {
        font-size: 12px;
    }
    
    .details {
        font-size: 12px;
        margin-bottom: 8px;
    }
    
    .status {
        font-size: 10px;
        margin-bottom: 8px;
    }
    
    .actions {
        gap: 6px;
        margin-top: 8px;
    }
    
    button {
        padding: 8px;
        font-size: 11px;
        min-height: 36px;
    }
}

/* Ensure no horizontal scrolling */
@media (max-width: 768px) {
    html, body {
        overflow-x: hidden;
        width: 100%;
        max-width: 100%;
    }
    
    * {
        box-sizing: border-box;
    }
    
    img {
        max-width: 100%;
        height: auto;
    }
}

/* High DPI displays */
@media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
    .header h1,
    .stat h2,
    .card h3,
    button,
    .filter,
    .search-box input {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
}

/* Touch devices */
@media (hover: none) and (pointer: coarse) {
    .filter:hover {
        background: #333;
        color: #ddd;
    }
    
    .filter:active {
        transform: scale(0.98);
        transition: transform 0.1s ease;
    }
    
    .filter.active:active {
        background: #c9a227;
        color: black;
    }
    
    button:hover {
        transform: none;
    }
    
    button:active {
        transform: scale(0.98);
        transition: transform 0.1s ease;
    }
    
    .approve:active {
        background: #218838;
    }
    
    .decline:active {
        background: #c82333;
    }
}

</style>
</head>
<body>

<div class="header">
<h1><i class="fas fa-wrench"></i> SERVICE REQUESTS</h1>
<p>Manage customer service requests</p>
</div>

<div class="container">

<!-- STATS -->
<div class="stats">
<div class="stat"><h2 id="total">0</h2>TOTAL</div>
<div class="stat"><h2 id="pending">0</h2>PENDING</div>
<div class="stat"><h2 id="approved">0</h2>APPROVED</div>
<div class="stat"><h2 id="declined">0</h2>DECLINED</div>
</div>

<!-- SEARCH + FILTER -->
<div class="request-search">

<div class="search-box">
<i class="fas fa-search"></i>&nbsp;
<input id="search" placeholder="Search requests...">
</div>

<button class="filter active" onclick="filterCards('all')">All</button>
<button class="filter" onclick="filterCards('pending')">Pending</button>
<button class="filter" onclick="filterCards('approved')">Approved</button>
<button class="filter" onclick="filterCards('declined')">Declined</button>

</div>

<!-- REQUESTS -->
<div class="cards" id="cards"></div>

</div>

<script>

const requests=[
{id:1021,name:"John Doe",phone:"9876543210",vehicle:"Car",service:"Engine Repair",status:"pending"},
{id:1022,name:"Sarah Johnson",phone:"9123456789",vehicle:"Bike",service:"Oil Change",status:"pending"},
{id:1023,name:"Mike Ross",phone:"8899776655",vehicle:"Truck",service:"Brake Repair",status:"pending"},
{id:1024,name:"Emma Stone",phone:"9988776655",vehicle:"Scooter",service:"Full Service",status:"pending"},
{id:1025,name:"Chris Evans",phone:"8877665544",vehicle:"Car",service:"AC Repair",status:"pending"}
];

function draw(){

const cards=document.getElementById("cards");
cards.innerHTML="";

requests.forEach((r,i)=>{

cards.innerHTML+=`
<div class="card" data-status="${r.status}">

<h3>Request #${r.id}</h3>

<div class="user">
<div class="avatar">${r.name[0]}</div>
<div><b>${r.name}</b><br><small>${r.phone}</small></div>
</div>

<div class="details">
Vehicle: ${r.vehicle}<br>
Service: ${r.service}
</div>

<div class="status ${r.status}">STATUS: ${r.status.toUpperCase()}</div>

<div class="actions">

<button class="approve" onclick="setStatus(${i},'approved')">APPROVE</button>
<button class="decline" onclick="setStatus(${i},'declined')">DECLINE</button>

</div>

</div>`;
});

updateStats();
}

function setStatus(index,status){
requests[index].status=status;
draw();
}

function updateStats(){

document.getElementById("total").innerText=requests.length;

document.getElementById("pending").innerText=
requests.filter(r=>r.status==="pending").length;

document.getElementById("approved").innerText=
requests.filter(r=>r.status==="approved").length;

document.getElementById("declined").innerText=
requests.filter(r=>r.status==="declined").length;

}

function filterCards(type){

document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

document.querySelectorAll(".card").forEach(c=>{
if(type==="all") c.style.display="block";
else c.style.display=c.dataset.status===type?"block":"none";
});

}

draw();

</script>

</body>
</html>
